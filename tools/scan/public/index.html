<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>AI Design Pattern Scan</title>
<style>
  * { box-sizing: border-box; }
  body { font: 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; color: #111; background: #fafafa; }
  header { padding: 14px 18px; background: #fff; border-bottom: 1px solid #ddd; }
  header h1 { margin: 0 0 8px; font-size: 18px; font-weight: 600; }
  header .sub { color: #666; font-size: 12px; }

  .form { display: flex; gap: 8px; padding: 14px 18px; background: #fff; border-bottom: 1px solid #eee; }
  .form input { flex: 1; font: inherit; padding: 8px 10px; border: 1px solid #ccc; border-radius: 4px; font-family: ui-monospace, SFMono-Regular, monospace; font-size: 13px; }
  .form button { font: inherit; padding: 8px 16px; background: #111; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: 500; }
  .form button:hover:not(:disabled) { background: #333; }
  .form button:disabled { background: #999; cursor: not-allowed; }

  .status { padding: 10px 18px; color: #666; font-size: 13px; min-height: 22px; }
  .status.error { color: #b03a2e; background: #fdecec; border-bottom: 1px solid #f3c8c4; }

  .layout { display: grid; grid-template-columns: minmax(320px, 1fr) minmax(420px, 1fr); gap: 12px; padding: 12px; }
  @media (max-width: 900px) { .layout { grid-template-columns: 1fr; } }
  .shot { background: #f5f5f5; border: 1px solid #ddd; overflow: auto; max-height: calc(100vh - 200px); cursor: zoom-in; }
  .shot img { width: 100%; display: block; }
  .shot.empty { display: flex; align-items: center; justify-content: center; min-height: 280px; color: #999; font-style: italic; }

  .panel { background: #fff; border: 1px solid #ddd; padding: 14px 16px; max-height: calc(100vh - 200px); overflow: auto; }

  .verdict { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid #eee; }
  .tier { font-size: 22px; font-weight: 700; padding: 6px 14px; border-radius: 6px; }
  .tier.heavy { background: #fdecec; color: #8b1a1a; }
  .tier.mild  { background: #fff3c4; color: #8a6500; }
  .tier.clean { background: #e6f3e1; color: #2c7a3a; }
  .score { font-variant-numeric: tabular-nums; }
  .score .num { font-size: 28px; font-weight: 700; }
  .score .denom { color: #666; font-size: 13px; }
  .meta { color: #666; font-size: 12px; }

  .url { font-family: ui-monospace, SFMono-Regular, monospace; font-size: 12px; word-break: break-all; margin: 6px 0 12px; }
  .url a { color: #1a4dba; }

  h2 { font-size: 13px; font-weight: 600; color: #444; text-transform: uppercase; letter-spacing: 0.05em; margin: 14px 0 8px; }

  .pattern { padding: 8px 10px; border-radius: 4px; margin-bottom: 4px; border: 1px solid #eee; }
  .pattern.on { background: #fdecec; border-color: #f3c8c4; }
  .pattern.off { color: #888; }
  .pattern .head { display: flex; align-items: center; gap: 8px; }
  .pattern .head h3 { margin: 0; font-size: 13px; font-weight: 500; flex: 1; }
  .pattern .badge { font-size: 11px; font-weight: 600; padding: 1px 6px; border-radius: 2px; flex-shrink: 0; }
  .pattern .badge.on { background: #c6310f; color: white; }
  .pattern .badge.off { background: #ddd; color: #666; }
  .pattern .ev { color: #555; font-size: 12px; margin: 4px 0 0; font-style: italic; }
  .pattern .ev pre { margin: 4px 0 0; padding: 6px 8px; background: rgba(0,0,0,0.04); border-radius: 3px; font-size: 11px; overflow: auto; max-height: 120px; }

  .placeholder { padding: 40px 20px; text-align: center; color: #999; }
  .placeholder .big { font-size: 16px; margin-bottom: 6px; }

  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #ccc; border-top-color: #111; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: -3px; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .zoom-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 100; cursor: zoom-out; padding: 20px; overflow: auto; }
  .zoom-overlay.open { display: flex; }
  .zoom-overlay img { max-width: 100%; display: block; }
</style>
</head>
<body>

<header>
  <h1>AI Design Pattern Scan</h1>
  <div class="sub">Paste a URL, run the detector live, see which AI design patterns trip.</div>
</header>

<form class="form" id="form">
  <input type="text" id="url" placeholder="https://example.com" autocomplete="off" autofocus>
  <button type="submit" id="submit">Scan</button>
</form>

<div class="status" id="status"></div>

<div class="layout">
  <div class="shot empty" id="shot-wrap"><span>No scan yet.</span></div>
  <div class="panel" id="panel">
    <div class="placeholder">
      <div class="big">Paste a URL above and hit Scan.</div>
      <div>Each scan launches a real browser, navigates the page, runs ~15 deterministic pattern checks, and screenshots the full page. Takes 5–15s.</div>
    </div>
  </div>
</div>

<div class="zoom-overlay" id="zoom"><img id="zoom-img" alt=""></div>

<script>
const form = document.getElementById('form');
const urlInput = document.getElementById('url');
const submit = document.getElementById('submit');
const statusEl = document.getElementById('status');
const shotWrap = document.getElementById('shot-wrap');
const panel = document.getElementById('panel');
const zoom = document.getElementById('zoom');
const zoomImg = document.getElementById('zoom-img');

shotWrap.addEventListener('click', () => {
  const img = shotWrap.querySelector('img');
  if (!img) return;
  zoomImg.src = img.src;
  zoom.classList.add('open');
});
zoom.addEventListener('click', () => zoom.classList.remove('open'));
document.addEventListener('keydown', e => { if (e.key === 'Escape') zoom.classList.remove('open'); });

form.addEventListener('submit', async e => {
  e.preventDefault();
  const url = urlInput.value.trim();
  if (!url) return;
  submit.disabled = true;
  statusEl.classList.remove('error');
  statusEl.innerHTML = '<span class="spinner"></span>Scanning ' + escapeHtml(url) + '…';
  shotWrap.classList.add('empty');
  shotWrap.innerHTML = '<span>Loading…</span>';
  panel.innerHTML = '<div class="placeholder"><div class="big">Running detector…</div><div>Launching browser, waiting for fonts, scrolling for lazy content.</div></div>';

  try {
    const res = await fetch('/api/scan', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ url })
    });
    const data = await res.json();
    if (!res.ok) {
      statusEl.classList.add('error');
      statusEl.textContent = 'Error: ' + (data.error || res.statusText);
      shotWrap.classList.add('empty');
      shotWrap.innerHTML = '<span>Scan failed.</span>';
      panel.innerHTML = '';
      return;
    }
    render(data);
    statusEl.textContent = 'Scanned in ' + (data.elapsedMs / 1000).toFixed(1) + 's.';
  } catch (err) {
    statusEl.classList.add('error');
    statusEl.textContent = 'Network error: ' + err.message;
  } finally {
    submit.disabled = false;
  }
});

function render(data) {
  // screenshot
  shotWrap.classList.remove('empty');
  shotWrap.innerHTML = '';
  const img = document.createElement('img');
  img.src = '/screenshots/' + data.slug + '.png?t=' + Date.now();
  img.alt = 'screenshot';
  shotWrap.appendChild(img);

  // panel
  const tierClass = (data.tierLabel || data.tier || '').toLowerCase();
  const flagged = data.patterns.filter(p => p.triggered);
  const notFlagged = data.patterns.filter(p => !p.triggered);

  let html = '';
  html += '<div class="verdict">';
  html += '<div class="tier ' + tierClass + '">' + escapeHtml(data.tierLabel || data.tier) + '</div>';
  html += '<div class="score"><span class="num">' + data.score + '</span><span class="denom">/100</span></div>';
  html += '<div class="meta">' + data.patternsFlagged + ' / ' + data.patternsTotal + ' patterns flagged</div>';
  html += '</div>';
  html += '<div class="url"><a href="' + escapeHtml(data.url) + '" target="_blank" rel="noopener">' + escapeHtml(data.url) + '</a></div>';

  html += '<h2>Flagged (' + flagged.length + ')</h2>';
  if (flagged.length === 0) {
    html += '<div style="color:#666;font-size:13px;">No patterns triggered.</div>';
  } else {
    for (const p of flagged) html += renderPattern(p, true);
  }

  html += '<h2>Not flagged (' + notFlagged.length + ')</h2>';
  for (const p of notFlagged) html += renderPattern(p, false);

  panel.innerHTML = html;
}

function renderPattern(p, on) {
  let s = '<div class="pattern ' + (on ? 'on' : 'off') + '">';
  s += '<div class="head">';
  s += '<h3>' + escapeHtml(p.label || p.id) + '</h3>';
  s += '<span class="badge ' + (on ? 'on' : 'off') + '">' + (on ? 'FLAGGED' : 'clean') + '</span>';
  s += '</div>';
  if (p.description) s += '<div class="ev">' + escapeHtml(p.description) + '</div>';
  if (on && p.evidence) {
    s += '<div class="ev"><pre>' + escapeHtml(JSON.stringify(p.evidence, null, 2)) + '</pre></div>';
  }
  s += '</div>';
  return s;
}

function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
}
</script>
</body>
</html>
