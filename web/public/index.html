<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚨</text></svg>">
<title>Design Slop Cop: how AI-generated is this website?</title>
<meta name="description" content="Paste a URL. We load it in a real browser and score it against deterministic AI design patterns like vibe purple, gradients, FAQ accordions, and 1·2·3 steps.">
<meta property="og:title" content="Design Slop Cop">
<meta property="og:description" content="Score any website for common AI design patterns.">
<style>
  /* GOV.UK Design System conventions on a Linear-style layout: Arial, bold
     black headings, blue underlined links, green square button with a hard
     bottom edge, yellow focus states, flat #b1b4b6-bordered panels, no radius. */
  :root {
    --font: arial, "Helvetica Neue", Helvetica, sans-serif;
    --text: #0b0c0c;
    --muted: #505a5f;
    --bg: #ffffff;
    --panel: #f3f2f1;
    --border: #b1b4b6;
    --link: #1d70b8;
    --link-hover: #003078;
    --green: #00703c;
    --green-hover: #005a30;
    --green-shadow: #002d18;
    --focus: #fd0;
    --heavy: #942514;  --heavy-bg: #f6d7d2;
    --mild: #594d00;   --mild-bg: #fff7bf;
    --clean: #005a30;  --clean-bg: #cce2d8;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text); font: 400 18px/1.5 var(--font); min-height: 100vh; display: flex; flex-direction: column; }

  a { color: var(--link); text-decoration: underline; text-underline-offset: 0.15em; text-decoration-thickness: 1px; }
  a:hover { color: var(--link-hover); text-decoration-thickness: 3px; }
  a:focus { outline: 3px solid transparent; color: #0b0c0c; background: var(--focus); box-shadow: 0 -2px var(--focus), 0 4px #0b0c0c; text-decoration: none; }

  .wrap { max-width: 760px; width: 100%; margin: 0 auto; padding: 0 24px 40px; flex: 1 0 auto; display: flex; flex-direction: column; }

  /* GOV.UK-style black masthead: black bar, white wordmark, nav link right. */
  .topbar { background: var(--text); }
  .topbar .inner { max-width: 760px; margin: 0 auto; padding: 12px 24px; display: flex; align-items: baseline; gap: 16px; }
  .topbar b { color: #fff; font-weight: 700; font-size: 17px; }
  .topbar nav { margin-left: auto; }
  .topbar nav a { color: #fff; font-size: 16px; text-decoration: underline; text-underline-offset: 0.15em; text-decoration-thickness: 1px; }
  .topbar nav a:hover { text-decoration-thickness: 3px; }
  .topbar nav a:focus { color: var(--text); background: var(--focus); box-shadow: 0 -2px var(--focus), 0 4px var(--text); text-decoration: none; outline: 3px solid transparent; }

  h1 { font-size: clamp(32px, 5vw, 48px); font-weight: 700; line-height: 1.09; margin: 48px 0 16px; }
  .lede { font-size: 19px; line-height: 1.47; margin: 0 0 32px; max-width: 580px; }

  .form { display: flex; gap: 10px; align-items: flex-start; }
  .form input {
    flex: 1; font: 400 19px/1.3 var(--font); color: var(--text);
    padding: 9px 11px; border: 2px solid var(--text); background: #fff;
  }
  .form input:focus { outline: 3px solid var(--focus); outline-offset: 0; box-shadow: inset 0 0 0 2px var(--text); }
  .form input::placeholder { color: #6f777b; }
  .form button {
    font: 400 19px var(--font); color: #fff; background: var(--green);
    border: 2px solid transparent; box-shadow: 0 2px 0 var(--green-shadow);
    padding: 9px 16px; cursor: pointer;
  }
  .form button:hover:not(:disabled) { background: var(--green-hover); }
  .form button:focus { outline: 3px solid transparent; background: var(--focus); color: var(--text); box-shadow: 0 4px 0 var(--text); }
  .form button:disabled { opacity: .6; cursor: not-allowed; }

  .examples { margin-top: 14px; font-size: 16px; color: var(--muted); }
  .examples button {
    font: 400 16px var(--font); background: none; border: 0; padding: 0; margin-left: 12px; cursor: pointer;
    color: var(--link); text-decoration: underline; text-underline-offset: 0.15em;
  }
  .examples button:hover { color: var(--link-hover); text-decoration-thickness: 3px; }
  .examples button:focus { outline: 3px solid transparent; color: var(--text); background: var(--focus); box-shadow: 0 -2px var(--focus), 0 4px var(--text); text-decoration: none; }

  /* GOV.UK finder document-list: one row per scan, newest prepended. Rows are
     separated from each other by a hairline (border on every row except the
     first), so there's no rule above the first card and none at all in the
     empty state. The footer supplies the single closing rule. Nothing shows
     until the first scan. */
  .results { margin-top: 28px; }
  .results > * + * { border-top: 1px solid var(--border); }
  .loading, .error-row { padding: 16px 0; color: var(--muted); font-size: 16px; display: flex; align-items: center; }
  .error-row { color: var(--heavy); font-weight: 700; }

  .item { display: grid; grid-template-columns: 120px 1fr; gap: 18px; padding: 20px 0; align-items: start; }
  @media (max-width: 600px) { .item { grid-template-columns: 88px 1fr; gap: 12px; } }
  .shot { border: 1px solid var(--border); overflow-y: auto; max-height: 220px; cursor: zoom-in; align-self: start; }
  .shot img { width: 100%; display: block; }
  .shot.empty { display: flex; align-items: center; justify-content: center; min-height: 78px; color: var(--muted); font-size: 13px; cursor: default; }

  .item .body { min-width: 0; }
  .item .title-line { display: flex; flex-wrap: wrap; align-items: baseline; gap: 10px; font-size: 19px; line-height: 1.3; }
  .item .title-line a.t { color: var(--link); font-weight: 700; text-decoration: underline; text-underline-offset: 0.15em; }
  .item .title-line a.t:hover { color: var(--link-hover); text-decoration-thickness: 3px; }
  /* Tier as a GOV.UK Tag: tinted badge, uppercase; the text carries the meaning
     (not colour alone), per GOV.UK accessibility guidance. */
  .tier { font-weight: 700; font-size: 12px; letter-spacing: .02em; text-transform: uppercase; padding: 2px 8px 1px; white-space: nowrap; }
  .tier.heavy { color: var(--heavy); background: var(--heavy-bg); }
  .tier.mild  { color: var(--mild);  background: var(--mild-bg); }
  .tier.clean { color: var(--clean); background: var(--clean-bg); }
  .item .meta { color: var(--muted); font-size: 15px; margin-top: 4px; }

  /* Detected patterns: a compact list of the tells found — names always
     visible; the clean (not-triggered) patterns aren't listed (the count in
     .meta already implies them). */
  .patterns { list-style: none; margin: 16px 0 0; padding: 0; display: flex; flex-direction: column; gap: 9px; }
  /* Square marker as a pseudo-element pinned to the first text line, so it
     stays aligned with the heading regardless of wrapping. */
  .pattern { position: relative; padding-left: 20px; font-size: 17px; font-weight: 700; line-height: 1.4; }
  .pattern::before { content: ""; position: absolute; left: 0; top: 0.55em; width: 8px; height: 8px; margin-top: -4px; background: var(--heavy); }
  .none { color: var(--clean); font-size: 17px; font-weight: 700; margin: 16px 0 0; }

  /* "What these mean": GOV.UK Details disclosure — keyboard/touch/screen-reader
     accessible, unlike a hover tooltip. Descriptions revealed only on demand. */
  .why { margin-top: 16px; }
  .why > summary { display: inline-flex; align-items: center; gap: 8px; width: fit-content; color: var(--link); font-size: 16px; text-decoration: underline; text-underline-offset: 0.15em; cursor: pointer; list-style: none; }
  .why > summary::-webkit-details-marker { display: none; }
  .why > summary::before { content: ''; width: 0; height: 0; border-style: solid; border-width: 5px 0 5px 7px; border-color: transparent transparent transparent currentColor; transition: transform .1s ease; }
  .why[open] > summary::before { transform: rotate(90deg); }
  .why > summary:hover { color: var(--link-hover); text-decoration-thickness: 3px; }
  .why > summary:focus { outline: 3px solid transparent; color: var(--text); background: var(--focus); box-shadow: 0 -2px var(--focus), 0 4px var(--text); text-decoration: none; }
  .why-list { margin: 12px 0 2px; padding: 2px 0 2px 16px; border-left: 4px solid var(--border); }
  .why-list > div { padding: 6px 0; }
  .why-list dt { font-weight: 700; font-size: 16px; }
  .why-list dd { margin: 3px 0 0; color: var(--muted); font-size: 15px; line-height: 1.45; }

  /* margin-top:auto pins the footer to the bottom of the viewport when content
     is short; collapses to 0 when results overflow (the last row's own padding
     keeps a gap above the rule). One rule, always at the bottom. */
  footer { margin-top: auto; padding-top: 20px; border-top: 1px solid var(--border); color: var(--muted); font-size: 15px; line-height: 1.55; }

  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--text); border-radius: 50%; animation: spin .7s linear infinite; margin-right: 9px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .zoom { position: fixed; inset: 0; background: rgba(0,0,0,.8); display: none; align-items: flex-start; justify-content: center; z-index: 99; cursor: zoom-out; padding: 28px; overflow: auto; }
  .zoom.open { display: flex; }
  .zoom img { max-width: 100%; border: 2px solid #fff; }
</style>
</head>
<body>

<div class="topbar"><div class="inner"><b>Design Slop Cop</b><nav><a href="/show">Latest Show HN, scored</a></nav></div></div>

<div class="wrap">
  <h1>How AI-generated is this website?</h1>
  <p class="lede">
    Paste a URL and score it against common AI design patterns.
    Background: <a href="https://www.adriankrebs.ch/blog/design-slop/" target="_blank" rel="noopener">the blog post</a>
    and the <a href="https://news.ycombinator.com/item?id=47864393" target="_blank" rel="noopener">HN discussion</a>.
  </p>

  <form class="form" id="form">
    <input type="text" id="url" placeholder="example.com" autocomplete="off" autocapitalize="off" spellcheck="false" autofocus>
    <button type="submit" id="submit">Scan</button>
  </form>
  <div class="examples">
    <button id="random" type="button">Try a random website (Show HN)</button>
  </div>

  <div class="results" id="results"></div>

  <footer>
    Source: <a href="https://github.com/AdrianKrebs/design-slop-cop" target="_blank" rel="noopener">github.com/AdrianKrebs/design-slop-cop</a>.
  </footer>
</div>

<div class="zoom" id="zoom"><img id="zoomImg" alt=""></div>

<script>
const $ = s => document.querySelector(s);
const form = $('#form'), urlInput = $('#url'), submit = $('#submit');
const results = $('#results');
const zoom = $('#zoom'), zoomImg = $('#zoomImg');

document.getElementById('random').addEventListener('click', async () => {
  try {
    const r = await fetch('/api/random');
    const d = await r.json();
    if (d.url) { urlInput.value = d.url; form.requestSubmit(); }
  } catch (e) { /* ignore; user can paste a URL manually */ }
});

// screenshots are added dynamically, so delegate the zoom click
results.addEventListener('click', e => {
  const img = e.target.closest('.shot img');
  if (!img) return;
  zoomImg.src = img.src; zoom.classList.add('open');
});
zoom.addEventListener('click', () => zoom.classList.remove('open'));
document.addEventListener('keydown', e => { if (e.key === 'Escape') zoom.classList.remove('open'); });

form.addEventListener('submit', async e => {
  e.preventDefault();
  const url = urlInput.value.trim();
  if (!url) return;
  submit.disabled = true;

  // prepend a loading row so the newest scan sits on top of the list
  const card = document.createElement('div');
  card.className = 'loading';
  card.innerHTML = '<span class="spinner"></span>Scanning ' + esc(url) + '…';
  results.prepend(card);

  try {
    const res = await fetch('/api/scan', { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ url }) });
    const data = await res.json();
    if (!res.ok) {
      card.className = 'error-row';
      card.textContent = 'Couldn’t scan ' + url + ': ' + (data.error || res.statusText);
      return;
    }
    card.className = 'item';
    card.innerHTML = renderCard(data);
  } catch (err) {
    card.className = 'error-row';
    card.textContent = 'Network error: ' + err.message;
  } finally {
    submit.disabled = false;
  }
});

function renderCard(data) {
  const tierClass = (data.tierLabel || data.tier || '').toLowerCase();
  const tierName = { Heavy: 'Heavy', Mild: 'Some', Clean: 'Clean' }[data.tierLabel] || data.tierLabel || data.tier;
  const flagged = data.patterns.filter(p => p.triggered);
  const timing = data.cached ? 'cached' : (data.elapsedMs / 1000).toFixed(1) + 's';

  let h = data.screenshot
    ? '<div class="shot"><img src="' + data.screenshot + '" alt="screenshot of ' + esc(data.url) + '"></div>'
    : '<div class="shot empty">no screenshot</div>';

  h += '<div class="body">';
  h += '<div class="title-line"><a class="t" href="' + esc(data.url) + '" target="_blank" rel="noopener">' + esc(hostOf(data.url)) + '</a>';
  h += '<span class="tier ' + tierClass + '">' + esc(tierName) + '</span></div>';
  h += '<div class="meta">' + data.score + '/100 · ' + data.patternsFlagged + ' of ' + data.patternsTotal + ' patterns · ' + timing + '</div>';

  if (flagged.length) {
    // Names always visible (the tells found); descriptions revealed on demand
    // via a GOV.UK Details disclosure — accessible, unlike a hover tooltip.
    h += '<ul class="patterns">';
    h += flagged.map(p => '<li class="pattern">' + esc(p.label || p.id) + '</li>').join('');
    h += '</ul>';
    const withDesc = flagged.filter(p => p.description);
    if (withDesc.length) {
      h += '<details class="why"><summary>What ' + (flagged.length === 1 ? 'this pattern means' : 'these patterns mean') + '</summary><dl class="why-list">';
      h += withDesc.map(p => '<div><dt>' + esc(p.label || p.id) + '</dt><dd>' + esc(p.description) + '</dd></div>').join('');
      h += '</dl></details>';
    }
  } else {
    h += '<p class="none">No AI design patterns triggered. Clean.</p>';
  }
  h += '</div>';
  return h;
}

function hostOf(u) { try { return new URL(u).hostname.replace(/^www\./, ''); } catch { return u; } }
function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }
</script>
</body>
</html>
