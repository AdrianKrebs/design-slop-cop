<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>%F0%9F%9A%A8</text></svg>">
<title>Design Slop Cop: how AI-generated does this website look?</title>
<meta name="description" content="Paste a URL. We load it in a real browser and score it against deterministic AI design patterns like vibe purple, gradients, FAQ accordions, and 1·2·3 steps.">
<meta property="og:title" content="Design Slop Cop">
<meta property="og:description" content="Score any website for common AI design patterns.">
<style>
  /* GOV.UK Design System components (masthead, underlined links, tag badges,
     flat panels, hard-edged button, high-contrast yellow focus) re-skinned with
     a Linear-inspired palette: system font, cool near-black + soft grey
     neutrals, an indigo accent, and a refined near-black primary button.
     Deliberately avoids the tells the tool itself flags — no gradients, no
     glassmorphism, no dark mode, no purple *fills* on the CTA. */
  :root {
    /* Palette + font reverse-engineered from linear.app's design tokens. */
    --font: "Inter Variable", "SF Pro Display", -apple-system, system-ui, "Segoe UI", Roboto, Helvetica, Arial, "Apple Color Emoji", sans-serif;
    --text: #23252a;         /* Linear content-highlight (light) */
    --muted: #6b6f76;        /* Linear content secondary */
    --bg: #fcfcfd;           /* Linear base bg (light) */
    --panel: #f5f5f5;        /* Linear sidebar/panel */
    --border: #e0e0e0;       /* Linear border (light) */
    --link: #6d78d5;         /* Linear accent / focus-ring indigo */
    --link-hover: #545fc0;
    --green: #6d78d5;        /* primary button: Linear indigo (hue ~234° reads as blue, so not flagged purple) */
    --green-hover: #5a64c4;
    --green-shadow: #3d4499;  /* darker indigo for the GOV.UK hard bottom edge */
    --focus: #6d78d5;        /* indigo focus ring (light bg); white ring on the dark masthead */
    --heavy: #b3261e;  --heavy-bg: #fbe6e4;
    --mild: #7a5b00;   --mild-bg: #fdf3d3;
    --clean: #1a7f52;  --clean-bg: #e0f0e8;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text); font: 400 18px/1.5 var(--font); min-height: 100vh; display: flex; flex-direction: column; }

  a { color: var(--link); text-decoration: underline; text-underline-offset: 0.15em; text-decoration-thickness: 1px; }
  a:hover { color: var(--link-hover); text-decoration-thickness: 3px; }
  a:focus-visible { outline: 2px solid var(--focus); outline-offset: 2px; }

  .wrap { max-width: 760px; width: 100%; margin: 0 auto; padding: 0 24px 40px; flex: 1 0 auto; display: flex; flex-direction: column; }

  /* GOV.UK-style black masthead: black bar, white wordmark, nav link right. */
  .topbar { background: var(--text); }
  .topbar .inner { max-width: 760px; margin: 0 auto; padding: 12px 24px; display: flex; align-items: baseline; gap: 16px; }
  .topbar b { color: #fff; font-weight: 700; font-size: 17px; }
  .topbar nav { margin-left: auto; display: flex; gap: 16px; }
  .topbar nav a { color: #fff; font-size: 16px; text-decoration: underline; text-underline-offset: 0.15em; text-decoration-thickness: 1px; }
  .topbar nav a:hover { text-decoration-thickness: 3px; }
  .topbar nav a:focus-visible { outline: 2px solid #fff; outline-offset: 2px; text-decoration: none; }

  h1 { font-size: clamp(32px, 5vw, 48px); font-weight: 700; line-height: 1.09; margin: 48px 0 16px; }
  .lede { font-size: 19px; line-height: 1.47; margin: 0 0 32px; max-width: 580px; }

  .form { display: flex; gap: 10px; align-items: flex-start; }
  /* Input + button share an explicit 46px height (box-sizing: border-box) so
     they line up exactly; both square. */
  .form input {
    flex: 1; height: 46px; font: 400 18px var(--font); color: var(--text);
    padding: 0 12px; border: 1px solid var(--border); background: #fff;
  }
  .form input:focus-visible { outline: 2px solid var(--focus); outline-offset: 0; border-color: var(--focus); }
  .form input::placeholder { color: #9aa0a8; }
  /* GOV.UK button component (square, 2px bottom edge, press-down on :active),
     recoloured to Linear indigo. Same 46px height as the input so they align. */
  .form button {
    height: 46px; font: 500 18px var(--font); color: #fff; background: var(--green);
    border: 0; box-shadow: 0 2px 0 var(--green-shadow); padding: 0 20px; cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center; transition: background-color .12s ease;
  }
  .form button:hover:not(:disabled) { background: var(--green-hover); }
  .form button:active { box-shadow: none; transform: translateY(2px); }
  .form button:focus-visible { outline: 2px solid var(--focus); outline-offset: 2px; }
  .form button:disabled { opacity: .55; cursor: not-allowed; }

  .examples { margin-top: 14px; font-size: 16px; color: var(--muted); }
  .examples button {
    font: 400 16px var(--font); background: none; border: 0; padding: 0; cursor: pointer;
    color: var(--link); text-decoration: underline; text-underline-offset: 0.15em;
  }
  .examples button:hover { color: var(--link-hover); text-decoration-thickness: 3px; }
  .examples button:focus-visible { outline: 2px solid var(--focus); outline-offset: 2px; }

  /* GOV.UK finder document-list: one row per scan, newest prepended. Rows are
     separated from each other by a hairline (border on every row except the
     first), so there's no rule above the first card and none at all in the
     empty state. The footer supplies the single closing rule. Nothing shows
     until the first scan. */
  .results { margin-top: 28px; }
  .results > * + * { border-top: 1px solid var(--border); }
  .loading, .error-row { padding: 16px 0; color: var(--muted); font-size: 16px; display: flex; align-items: center; }
  .error-row { color: var(--heavy); font-weight: 700; }

  .item { display: grid; grid-template-columns: 190px 1fr; gap: 22px; padding: 20px 0; align-items: start; }
  @media (max-width: 600px) { .item { grid-template-columns: 116px 1fr; gap: 14px; } }
  /* Thumbnail = a clean top-crop of the full-page screenshot (no scrollbar);
     click to zoom into the whole page. */
  .shot { border: 1px solid var(--border); overflow: hidden; max-height: 280px; cursor: zoom-in; align-self: start; background: var(--panel); }
  .shot img { width: 100%; display: block; }
  .shot.empty { display: flex; align-items: center; justify-content: center; min-height: 78px; color: var(--muted); font-size: 13px; cursor: default; }

  .item .body { min-width: 0; }
  .item .title-line { display: flex; flex-wrap: wrap; align-items: baseline; gap: 10px; font-size: 19px; line-height: 1.3; }
  .item .title-line a.t { color: var(--link); font-weight: 700; text-decoration: underline; text-underline-offset: 0.15em; }
  .item .title-line a.t:hover { color: var(--link-hover); text-decoration-thickness: 3px; }
  /* Tier as a GOV.UK Tag: tinted badge, uppercase; the text carries the meaning
     (not colour alone), per GOV.UK accessibility guidance. */
  .tier { font-weight: 700; font-size: 12px; letter-spacing: .02em; text-transform: uppercase; padding: 2px 8px 1px; white-space: nowrap; }
  .tier.heavy { color: var(--heavy); background: var(--heavy-bg); }
  .tier.mild  { color: var(--mild);  background: var(--mild-bg); }
  .tier.clean { color: var(--clean); background: var(--clean-bg); }
  .item .meta { color: var(--muted); font-size: 15px; margin-top: 4px; }

  /* Copy-link action, in the meta row as a plain text link ("Copy result link")
     so the intent is unambiguous. Flips to "Copied ✓" on click. */
  .copy { font: inherit; background: none; border: 0; padding: 0; margin: 0; cursor: pointer; color: var(--link); text-decoration: underline; text-underline-offset: 0.15em; white-space: nowrap; }
  .copy:hover { color: var(--link-hover); text-decoration-thickness: 2px; }
  .copy:focus-visible { outline: 2px solid var(--focus); outline-offset: 2px; }
  .copy.copied { color: var(--clean); text-decoration: none; cursor: default; }

  /* Detected patterns: the tells found. Each is a bold name that links to its
     entry on the /patterns reference page (definition + a real example), so the
     result card stays a clean, scannable list. */
  .patterns { list-style: none; margin: 16px 0 0; padding: 0; display: flex; flex-direction: column; gap: 9px; }
  /* Flex row: square marker + name. The marker's margin-top centers it on the
     text line (line box height − marker height, halved). */
  .pattern { display: flex; align-items: flex-start; gap: 11px; font-size: 17px; line-height: 1.4; }
  .pattern::before { content: ""; flex: 0 0 8px; width: 8px; height: 8px; margin-top: calc((1.4em - 8px) / 2); background: var(--heavy); }
  .pname { font-weight: 700; color: var(--link); text-decoration: underline; text-underline-offset: 0.15em; text-decoration-thickness: 1px; }
  .pname:hover { color: var(--link-hover); text-decoration-thickness: 3px; }
  .pname:focus-visible { outline: 2px solid var(--focus); outline-offset: 2px; }
  .none { color: var(--clean); font-size: 17px; font-weight: 700; margin: 16px 0 0; }

  /* margin-top:auto pins the footer to the bottom of the viewport when content
     is short; collapses to 0 when results overflow (the last row's own padding
     keeps a gap above the rule). One rule, always at the bottom. */
  footer { margin-top: auto; padding-top: 20px; border-top: 1px solid var(--border); color: var(--muted); font-size: 15px; line-height: 1.55; }

  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--text); border-radius: 50%; animation: spin .7s linear infinite; margin-right: 9px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .zoom { position: fixed; inset: 0; background: rgba(0,0,0,.8); display: none; align-items: flex-start; justify-content: center; z-index: 99; cursor: zoom-out; padding: 28px; overflow: auto; }
  .zoom.open { display: flex; }
  .zoom img { max-width: 100%; border: 2px solid #fff; }
</style>
</head>
<body>

<div class="topbar"><div class="inner"><b>Design Slop Cop</b><nav><a href="/patterns">Patterns</a><a href="/show">Gallery</a></nav></div></div>

<div class="wrap">
  <h1>How AI-generated does this website look?</h1>

  <form class="form" id="form">
    <input type="text" id="url" placeholder="example.com" autocomplete="off" autocapitalize="off" spellcheck="false" autofocus>
    <button type="submit" id="submit">Score</button>
  </form>
  <div class="examples">
    <button id="random" type="button">Try a random website</button>
  </div>

  <div class="results" id="results"></div>

  <footer>
    Source: <a href="https://github.com/AdrianKrebs/design-slop-cop" target="_blank" rel="noopener">github.com/AdrianKrebs/design-slop-cop</a>.
  </footer>
</div>

<div class="zoom" id="zoom"><img id="zoomImg" alt=""></div>

<script>
const $ = s => document.querySelector(s);
const form = $('#form'), urlInput = $('#url'), submit = $('#submit');
const results = $('#results');
const zoom = $('#zoom'), zoomImg = $('#zoomImg');

document.getElementById('random').addEventListener('click', async () => {
  try {
    const r = await fetch('/api/random');
    const d = await r.json();
    if (d.url) { urlInput.value = d.url; form.requestSubmit(); }
  } catch (e) { /* ignore; user can paste a URL manually */ }
});

// Result cards are added dynamically, so delegate clicks (copy link + zoom).
results.addEventListener('click', e => {
  const btn = e.target.closest('.copy');
  if (btn) {
    copyLink(btn.dataset.share).then(() => {
      btn.classList.add('copied'); btn.textContent = 'Copied ✓';
      setTimeout(() => { btn.classList.remove('copied'); btn.textContent = 'Copy result link'; }, 1500);
    }).catch(() => {});
    return;
  }
  const img = e.target.closest('.shot img');
  if (!img) return;
  zoomImg.src = img.src; zoom.classList.add('open');
});

function shareUrl(u) { return location.origin + '/?url=' + encodeURIComponent(u); }
function copyLink(text) {
  if (navigator.clipboard && window.isSecureContext) return navigator.clipboard.writeText(text);
  return new Promise((resolve, reject) => {
    try {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.select(); document.execCommand('copy');
      document.body.removeChild(ta); resolve();
    } catch (err) { reject(err); }
  });
}
zoom.addEventListener('click', () => zoom.classList.remove('open'));
document.addEventListener('keydown', e => { if (e.key === 'Escape') zoom.classList.remove('open'); });

form.addEventListener('submit', async e => {
  e.preventDefault();
  const url = urlInput.value.trim();
  if (!url) return;
  submit.disabled = true;

  // Clear stale error rows from earlier attempts — only real results persist.
  results.querySelectorAll('.error-row').forEach(el => el.remove());

  // prepend a loading row so the newest scan sits on top of the list
  const card = document.createElement('div');
  card.className = 'loading';
  card.innerHTML = '<span class="spinner"></span><span class="phase"></span>';
  results.prepend(card);

  // The scan is one request, so we can't get real progress — but stepping the
  // label through the actual stages (load → settle → DOM → score) reads far
  // less like a hang than a frozen "Scoring…". Advances, then holds on the last.
  const host = hostOf(url) || url;
  const phases = ['Loading ' + host + '…', 'Waiting for fonts & images…', 'Scanning the DOM…', 'Scoring slop…'];
  const phaseEl = card.querySelector('.phase');
  let pi = 0;
  phaseEl.textContent = phases[0];
  const phaseTimer = setInterval(() => {
    pi = Math.min(pi + 1, phases.length - 1);
    phaseEl.textContent = phases[pi];
  }, 1800);

  try {
    const res = await fetch('/api/scan', { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ url }) });
    const data = await res.json();
    if (!res.ok) {
      card.className = 'error-row';
      card.textContent = 'Couldn’t score ' + url + ': ' + (data.error || res.statusText);
      return;
    }
    card.className = 'item';
    card.innerHTML = renderCard(data);
    // Reflect the latest result in the address bar so it's directly shareable.
    try { history.replaceState(null, '', '?url=' + encodeURIComponent(data.url)); } catch (_) {}
  } catch (err) {
    card.className = 'error-row';
    card.textContent = 'Network error: ' + err.message;
  } finally {
    clearInterval(phaseTimer);
    submit.disabled = false;
  }
});

function renderCard(data) {
  const tierClass = (data.tierLabel || data.tier || '').toLowerCase();
  // 0 → None, 1–2 → Low (a pass — common modern traits, not "slop"), 3–5 →
  // Medium, 6+ → High. Matches the gallery's plain severity labels.
  const tierName = data.patternsFlagged === 0
    ? 'None'
    : { Heavy: 'High', Mild: 'Medium', Clean: 'Low' }[data.tierLabel] || data.tierLabel || data.tier;
  const flagged = data.patterns.filter(p => p.triggered);
  const timing = data.cached ? 'cached' : (data.elapsedMs / 1000).toFixed(1) + 's';

  let h = data.screenshot
    ? '<div class="shot"><img src="' + data.screenshot + '" alt="screenshot of ' + esc(data.url) + '"></div>'
    : '<div class="shot empty">no screenshot</div>';

  h += '<div class="body">';
  h += '<div class="title-line"><a class="t" href="' + esc(data.url) + '" target="_blank" rel="noopener">' + esc(hostOf(data.url)) + '</a>';
  h += '<span class="tier ' + tierClass + '">' + esc(tierName) + '</span></div>';
  // Copy-link lives in the meta row (not the title line) with a visible label,
  // so it's clear it copies a shareable link to *this* result — and it never
  // crowds the host + tier badge on a narrow screen.
  h += '<div class="meta">' + data.patternsFlagged + '/' + data.patternsTotal + ' patterns · ' + timing +
       ' · <button class="copy" type="button" title="Copy a shareable link to this result" data-share="' + esc(shareUrl(data.url)) + '">Copy result link</button></div>';

  if (flagged.length) {
    // The tells found; each name links to its entry on the /patterns reference
    // page (definition + example), so the card itself stays a clean list.
    h += '<ul class="patterns">';
    h += flagged.map(p =>
      '<li class="pattern"><a class="pname" href="/patterns#' + esc(p.id) + '">' + esc(p.shortLabel || p.label || p.id) + '</a></li>'
    ).join('');
    h += '</ul>';
  } else {
    h += '<p class="none">No AI design patterns triggered. Clean.</p>';
  }
  h += '</div>';
  return h;
}

function hostOf(u) { try { return new URL(u).hostname.replace(/^www\./, ''); } catch { return u; } }
function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }

// Cmd/Ctrl+Enter fires the scan from anywhere on the page (Enter already
// submits when the input is focused; this covers the rest).
document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') { e.preventDefault(); form.requestSubmit(); }
});

// Deep link: /?url=example.com pre-fills and runs the scan on load
// (served instantly from cache if the result is still warm).
const deepLinkUrl = new URLSearchParams(location.search).get('url');
if (deepLinkUrl) { urlInput.value = deepLinkUrl; form.requestSubmit(); }
</script>
</body>
</html>
