# fly.toml app configuration file generated for design-slop-cop on 2026-06-18T08:21:02Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'design-slop-cop'
primary_region = 'ams'

[build]
  dockerfile = 'Dockerfile'

[env]
  MAX_QUEUE = '12'
  PORT = '8080'
  RATE_PER_MIN = '12'
  SCAN_CONCURRENCY = '2'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 4
    soft_limit = 2

  [[http_service.checks]]
    interval = '15s'
    timeout = '3s'
    grace_period = '20s'
    method = 'get'
    path = '/healthz'

[[vm]]
  size = 'shared-cpu-2x'
  memory = '2gb'
